name: Keep Render alive

on:
  schedule:
    - cron: "*/10 * * * *"  # every 10 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Baile API
        run: |
          curl -s https://baile-conversational-grocery-agent.onrender.com/health
          echo "Pinged at $(date)"
