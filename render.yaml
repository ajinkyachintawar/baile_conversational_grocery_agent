services:
  - type: web
    name: baile-api
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: NIM_API_KEY_EMBED
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: REDIS_URL
        sync: false
    healthCheckPath: /health
