version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: baile-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: baile-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: baile-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
